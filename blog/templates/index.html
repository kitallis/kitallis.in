<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>blog — kitallis.in</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="alternate" type="application/rss+xml" title="blog — kitallis.in" href="/blog/rss.xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Bricolage Grotesque", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 300;
      font-size: 20px;
      background: oklch(20% 0.0195 232.58);
      color: hsl(210, 12%, 85%, 0.85);
      min-height: 100vh;
      padding: 3rem 2rem;
      line-height: 1.6;
    }
    main { max-width: 700px; margin: 0 auto; }
    a { color: #c9c9c9; text-decoration: none; border-bottom: 1px solid #444; }
    a:hover { color: #fff; border-color: #888; }
    nav { margin-bottom: 2rem; }
    .posts { display: flex; flex-direction: column; gap: 0.5rem; }
    .posts a {
      border-bottom: none;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }
    .posts a:hover { color: #fff; }
    .date { color: #666; white-space: nowrap; font-size: 0.8em; }
    .draft-tag { color: #b58900; font-size: 0.85em; }
  </style>
  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400&display=swap"
      rel="stylesheet"
    />
  </noscript>
</head>
<body>
  <main>
    <nav><a href="/">kitallis</a></nav>
    <div class="posts">
      {{posts}}
    </div>
  </main>
</body>
</html>
