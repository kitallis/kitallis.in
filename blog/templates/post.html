<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}} — kitallis.in</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="alternate" type="application/rss+xml" title="blog — kitallis.in" href="/rss.xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Bricolage Grotesque", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 300;
      font-size: 20px;
      background: oklch(20% 0.0195 232.58);
      color: hsl(210, 12%, 85%, 0.85);
      min-height: 100vh;
      padding: 3rem 2rem;
      line-height: 1.6;
    }
    main { max-width: 700px; margin: 0 auto; }
    a { color: #c9c9c9; text-decoration: none; border-bottom: 1px solid #444; }
    a:hover { color: #fff; border-color: #888; }
    nav { margin-bottom: 2rem; }
    .draft-tag { color: #b58900; font-size: 0.85em; }
    article h1 { margin-bottom: 0.25rem; }
    article time { color: #888; display: block; margin-bottom: 2rem; }
    .content p { margin-bottom: 1rem; }
    .content ul, .content ol { margin: 0 0 1rem 1.5rem; }
    .content li { margin-bottom: 0.25rem; }
    .content blockquote {
      border-left: 2px solid #444;
      padding-left: 1rem;
      color: #999;
      margin-bottom: 1rem;
    }
    .content pre {
      background: #1a1a1a;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .content code {
      background: #1a1a1a;
      padding: 0.15rem 0.3rem;
      border-radius: 2px;
      font-size: 0.9em;
    }
    .content pre code { background: none; padding: 0; }
    .content img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }
    .content hr { border: none; border-top: 1px solid #333; margin: 2rem 0; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 0.9em;
      border: 1px solid #333;
      border-radius: 4px;
    }
    .content th, .content td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #2a2a2a;
      border-right: 1px solid #2a2a2a;
      vertical-align: top;
    }
    .content th:last-child, .content td:last-child { border-right: none; }
    .content th {
      font-weight: 500;
      color: #fff;
      border-bottom-color: #444;
    }
    .content tbody tr:last-child td { border-bottom: none; }
    hr { border: none; border-top: 1px solid #333; margin: 2rem 0; }
    footer { font-size: 0.75em; color: #888; }
    footer a { color: #888; }
    .subscribe { margin-left: auto; }
    footer a:hover { color: #fff; }
    .links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  </style>
  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400&display=swap"
      rel="stylesheet"
    />
  </noscript>
</head>
<body>
  <main>
    <nav><a href="/" aria-label="Home"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></a></nav>
    <article>
      <h1>{{title}}{{draft-tag}}</h1>
      <time>{{date}}</time>
      <div class="content">
        {{content}}
      </div>
    </article>
    <hr />
    <footer>
      <nav class="links">
        <a href="mailto:mail@kitallis.in">mail</a>
        <a href="https://github.com/kitallis">github</a>
        <a href="https://bsky.app/profile/repartee.party">bluesky</a>
        <span class="subscribe"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.3rem;"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M22 8c0-2.3-.8-4.3-2-6"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/><path d="M4 2C2.8 3.7 2 5.7 2 8"/></svg> <a href="/rss.xml">rss</a> / <a href="/subscribe/">email</a></span>
      </nav>
    </footer>
  </main>
</body>
</html>
